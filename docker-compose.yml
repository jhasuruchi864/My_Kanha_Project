services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data/cleaned:/app/data/cleaned:ro
      - ./vector_db/chroma:/app/vector_db/chroma
    environment:
      - CHROMA_PERSIST_DIR=/app/vector_db/chroma
      - DATA_PATH=/app/data/cleaned
    env_file:
      - ./backend/.env
    networks:
      - kanha_network
    restart: unless-stopped

networks:
  kanha_network:
    driver: bridge
