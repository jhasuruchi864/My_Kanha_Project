<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Kanha Project</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Kanha">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <meta name="description" content="Your AI-powered spiritual companion inspired by the Bhagavad Gita">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #fffbe6 0%, #ffe5b4 50%, #e0c3a3 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    .background-blob {
      position: absolute;
      z-index: 0;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      animation: float 12s ease-in-out infinite alternate;
    }
    .blob1 {
      width: 340px; height: 340px;
      background: linear-gradient(135deg, #ffe5b4 0%, #fffbe6 100%);
      top: -80px; left: -120px;
      animation-delay: 0s;
    }
    .blob2 {
      width: 260px; height: 260px;
      background: linear-gradient(135deg, #f9d29d 0%, #f6e7cb 100%);
      bottom: -60px; right: -80px;
      animation-delay: 2s;
    }
    .blob3 {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, #b6e2d3 0%, #e0c3a3 100%);
      top: 60%; left: 60%;
      animation-delay: 4s;
    }
    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-30px) scale(1.08); }
    }
    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 251, 230, 0.98);
      border-radius: 22px;
      box-shadow: 0 6px 32px rgba(200,170,100,0.10);
      padding: 2.8rem 2.2rem 2.2rem 2.2rem;
      max-width: 420px;
      width: 92vw;
      text-align: center;
      animation: fadeIn 1.2s cubic-bezier(.39,.575,.56,1) both;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .logo {
      width: 70px;
      height: 70px;
      margin-bottom: 1.1rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe5b4 0%, #f9d29d 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(200,170,100,0.10);
      animation: popIn 1.2s cubic-bezier(.39,.575,.56,1) 0.2s both;
    }
    .logo span {
      font-size: 2.3rem;
      color: #e09f3e;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.7); }
      100% { opacity: 1; transform: scale(1); }
    }
    h1 {
      font-size: 2.3rem;
      margin-bottom: 0.4rem;
      color: #b6893e;
      letter-spacing: 0.5px;
      font-weight: 700;
      background: linear-gradient(90deg, #e09f3e 0%, #b6893e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
    }
    p {
      font-size: 1.13rem;
      color: #7c6f57;
      margin-bottom: 2.1rem;
      line-height: 1.6;
    }
    .start-btn {
      background: linear-gradient(90deg, #e09f3e 0%, #b6e2d3 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 1rem 2.5rem;
      font-size: 1.13rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(200,170,100,0.10);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    .start-btn:hover, .start-btn:focus {
      background: linear-gradient(90deg, #b6e2d3 0%, #e09f3e 100%);
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 6px 24px rgba(200,170,100,0.13);
      outline: none;
    }
    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .button-group a {
      flex: 1;
      min-width: 140px;
      max-width: 180px;
    }
    /* Ensure both buttons have equal size */
    .button-group .start-btn {
      width: 100%;
      padding: 0.9rem 1.5rem;
      font-size: 1rem;
    }
    .button-group .login-btn {
      background: linear-gradient(90deg, #e09f3e 0%, #b6e2d3 100%);
    }
    .button-group .login-btn:hover, .button-group .login-btn:focus {
      background: linear-gradient(90deg, #b6e2d3 0%, #e09f3e 100%);
    }
    .button-group .guest-btn {
      background: linear-gradient(90deg, #b6a89a 0%, #8b8077 100%);
    }
    .button-group .guest-btn:hover, .button-group .guest-btn:focus {
      background: linear-gradient(90deg, #8b8077 0%, #b6a89a 100%);
    }
    .subtitle {
      font-size: 1.02rem;
      color: #b6893e;
      margin-bottom: 1.7rem;
      font-style: italic;
      letter-spacing: 0.2px;
      opacity: 0.85;
    }
    @media (max-width: 600px) {
      .container {
        padding: 1.2rem 0.5rem 1.5rem 0.5rem;
        max-width: 98vw;
      }
      h1 {
        font-size: 1.4rem;
      }
      p {
        font-size: 0.98rem;
      }
      .button-group .start-btn {
        font-size: 0.95rem;
        padding: 0.75rem 1rem;
      }
      .button-group {
        flex-direction: column;
        gap: 0.8rem;
      }
      .button-group a {
        max-width: 100%;
      }
      .logo {
        width: 48px; height: 48px;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class="background-blob blob3"></div>
  <div class="container">
    <div class="logo"><span>🙏</span></div>
    <h1>My Kanha</h1>
    <div class="subtitle">Your AI-powered spiritual companion</div>
    <p>Embark on a journey of wisdom and self-discovery with an AI guide inspired by the Bhagavad Gita.</p>
    <div class="button-group">
      <a href="login.html">
        <button class="start-btn login-btn">Sign In</button>
      </a>
      <a href="chat.html">
        <button class="start-btn guest-btn">Continue as Guest</button>
      </a>
    </div>
  </div>

  <script src="assets/js/settings.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
