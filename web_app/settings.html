<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Settings | My Kanha Project</title>
	
	<!-- Bootstrap CSS -->
	<link href="https.cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<link rel="stylesheet" href="assets/css/styles.css">
	<link rel="manifest" href="manifest.json">
	<meta name="theme-color" content="#e09f3e">
	<!-- PWA Meta Tags -->
	<link rel="apple-touch-icon" href="assets/images/icon-192.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="My Kanha">
	<meta name="description" content="Customize your My Kanha experience">
	<script src="assets/js/config.js"></script>
</head>
<body>
	<header class="header">
		<div class="container-fluid">
			<nav class="navbar navbar-expand-lg">
				<a class="navbar-brand logo" href="index.html">🙏 My Kanha</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav ms-auto">
						<li class="nav-item">
							<a class="nav-link" href="chat.html">Chat</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="search.html">Search</a>
						</li>
						<li class="nav-item">
							<a class="nav-link" href="history.html">History</a>
						</li>
						<li class="nav-item">
							<a class="nav-link active" href="settings.html">Settings</a>
						</li>
					</ul>
				</div>
			</nav>
		</div>
	</header>
	
	<main class="main">
		<div class="container">
			<div class="settings-section">
				<h2>Settings</h2>
				<form class="settings-form">
					<!-- Dark Mode Toggle -->
					<div class="mb-3">
						<label for="darkMode" class="form-label">Dark Mode</label>
						<div class="form-check form-switch">
							<input class="form-check-input" type="checkbox" id="darkMode" name="darkMode">
							<label class="form-check-label" for="darkMode" id="darkModeStatus">Off</label>
						</div>
					</div>

					<!-- Theme Preview -->
					<div class="mb-3">
						<label class="form-label">Preview</label>
						<div id="themePreview" class="theme-preview">
							<div class="preview-box" style="background-color: var(--primary-color);">Primary Color</div>
							<div class="preview-box" style="background-color: var(--secondary-color);">Secondary Color</div>
							<div class="preview-box" style="background-color: var(--accent-color);">Accent Color</div>
						</div>
					</div>

					<!-- Existing Settings -->
					<div class="mb-3">
						<label for="language" class="form-label">Language</label>
						<select class="form-select" id="language" name="language" disabled>
							<option value="en">English</option>
							<option value="hi">Hindi</option>
						</select>
					</div>

					<!-- PWA Install -->
					<div class="mb-3">
						<label class="form-label">Install App</label>
						<p class="setting-description">Install My Kanha on your device for offline access and a native app experience.</p>
						<button type="button" id="pwa-install-btn" class="btn btn-primary install-btn" onclick="window.PWA && window.PWA.install()" style="display: none;">
							<span class="install-icon">&#x1F4F2;</span>
							Install My Kanha
						</button>
						<p id="pwa-installed-msg" class="pwa-status" style="display: none;">
							<span>&#x2705;</span> App is installed
						</p>
					</div>

					<!-- Action Buttons -->
					<div class="d-grid gap-2 d-md-flex justify-content-md-start">
						<button type="submit" class="btn btn-primary save-btn">Save Settings</button>
						<button type="reset" class="btn btn-secondary reset-btn">Reset to Default</button>
					</div>
				</form>
			</div>
		</div>
	</main>

	<!-- Bottom Navigation -->
	<nav class="bottom-nav">
		<a href="chat.html" class="bottom-nav-item">
			<span class="bottom-nav-icon">&#x1F4AC;</span>
			<span class="bottom-nav-label">Chat</span>
		</a>
		<a href="search.html" class="bottom-nav-item">
			<span class="bottom-nav-icon">&#x1F50D;</span>
			<span class="bottom-nav-label">Search</span>
		</a>
		<a href="history.html" class="bottom-nav-item">
			<span class="bottom-nav-icon">&#x1F4DC;</span>
			<span class="bottom-nav-label">History</span>
		</a>
		<a href="settings.html" class="bottom-nav-item active">
			<span class="bottom-nav-icon">&#x2699;</span>
			<span class="bottom-nav-label">Settings</span>
		</a>
	</nav>

	<!-- Bootstrap JS and Popper.js -->
	<script src="https.cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
	<script src="https.cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
	
	<script src="assets/js/settings.js"></script>
	<script src="assets/js/pwa.js"></script>
	<script>
		// Show/hide PWA install button based on install state
		document.addEventListener('DOMContentLoaded', function() {
			const installBtn = document.getElementById('pwa-install-btn');
			const installedMsg = document.getElementById('pwa-installed-msg');

			if (window.PWA && window.PWA.isInstalled()) {
				if (installBtn) installBtn.style.display = 'none';
				if (installedMsg) installedMsg.style.display = 'flex';
			}
		});
	</script>
</body>
</html>
