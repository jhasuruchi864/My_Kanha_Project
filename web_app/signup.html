<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign Up - My Kanha Project</title>
  <link rel="stylesheet" href="assets/css/login.css"> <!-- Reusing login CSS for consistency -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <script type="module" src="assets/js/firebase.js"></script>
</head>
<body>
  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class="background-blob blob3"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo"><span>🙏</span></div>
      <h1>Create Account</h1>
      <p class="login-subtitle">Join our community</p>
      
      <form class="login-form" id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6">
        </div>

        <button type="submit" class="login-btn">Sign Up</button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <button type="button" id="googleSignInBtn" class="login-btn" style="background:#fff;color:#333;border:1px solid #ccc;display:flex;align-items:center;gap:8px;justify-content:center">
        <img src="assets/images/icon-192.png" alt="Google" style="width:20px;height:20px;border-radius:4px"> Sign up with Google
      </button>

      <p class="signup-link">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="assets/js/signup.js"></script>
</body>
</html>
