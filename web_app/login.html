<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - My Kanha Project</title>
  <link rel="stylesheet" href="assets/css/login.css">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Kanha">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <meta name="description" content="Sign in to My Kanha - Your AI-powered spiritual companion">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module" src="assets/js/firebase.js"></script>
</head>
<body>
  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class="background-blob blob3"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo"><span>🙏</span></div>
      <h1>Mighty Kanha</h1>
      <p class="login-subtitle">Your AI-powered spiritual companion</p>
      
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required
          >
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <div id="g_id_onload"
        data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-logo_alignment="left"></div>

      <p class="signup-link">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </p>

      <p class="forgot-password">
        <a href="forgot-password.html">Forgot your password?</a>
      </p>

      <p class="terms-text">
        By signing in, you agree to our <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>
      </p>
    </div>

    <div class="login-info">
    </div>
  </div>

  <script src="assets/js/login.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
