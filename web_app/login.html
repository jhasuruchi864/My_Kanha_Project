<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - My Kanha Project</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <!-- PWA Meta Tags -->
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Kanha">
  <meta name="description" content="Sign in to My Kanha - Your AI-powered spiritual companion">
  <script src="assets/js/config.js"></script>
  <script type="module" src="assets/js/firebase.js"></script>
</head>
<body class="auth-page">

  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class="background-blob blob3"></div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="login-card">
          <div class="auth-logo"><span>🙏</span></div>
          <h1>My Kanha</h1>
          <p class="login-subtitle">Your AI-powered spiritual companion</p>
          
          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </div>
          </form>

          <div class="divider">
            <span>or</span>
          </div>

          <div class="d-grid">
            <button type="button" id="googleSignInBtn" class="btn btn-light border d-flex align-items-center justify-content-center">
              <img src="assets/images/icon-192.png" alt="Google" style="width:20px;height:20px;border-radius:4px; margin-right: 8px;">
              Continue with Google
            </button>
          </div>

          <p class="local-dev-notice" id="localDevNotice" style="display:none;font-size:0.8rem;color:#b6893e;margin:-0.5rem 0 1rem;text-align:center;">
            📱 On local network? Use email/password login.
          </p>

          <p class="mt-3">
            Don't have an account? <a href="signup.html">Sign up here</a>
          </p>

          <p>
            <a href="forgot-password.html">Forgot your password?</a>
          </p>

          <p class="terms-text">
            By signing in, you agree to our <a href="#terms">Terms of Service</a> and <a href="#privacy">Privacy Policy</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS and Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/login.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
