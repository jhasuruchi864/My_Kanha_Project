<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - My Kanha Project</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <script type="module" src="assets/js/firebase.js"></script>
</head>
<body class="auth-page">

  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class="background-blob blob3"></div>
  
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="login-card">
          <div class="auth-logo"><span>🔑</span></div>
          <h1>Reset Password</h1>
          <p class="login-subtitle">Enter your email to receive a reset link</p>
          
          <form id="resetForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="email" name="email" placeholder="Your registered email" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary login-btn">Send Reset Link</button>
            </div>
          </form>

          <p class="mt-3">
            Remembered your password? <a href="login.html">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS and Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  <script src="assets/js/forgot-password.js"></script>
</body>
</html>
