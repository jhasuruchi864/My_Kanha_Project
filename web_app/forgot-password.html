<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password - My Kanha Project</title>
  <link rel="stylesheet" href="assets/css/login.css"> <!-- Reusing login CSS -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <script type="module" src="assets/js/firebase.js"></script>
</head>
<body>
  <div class="background-blob blob1"></div>
  <div class="background-blob blob2"></div>
  <div class.="background-blob blob3"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo"><span>🔑</span></div>
      <h1>Reset Password</h1>
      <p class="login-subtitle">Enter your email to receive a reset link</p>
      
      <form class="login-form" id="resetForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Your registered email" required>
        </div>

        <button type="submit" class="login-btn">Send Reset Link</button>
      </form>

      <p class="signup-link">
        Remembered your password? <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="assets/js/forgot-password.js"></script>
</body>
</html>
