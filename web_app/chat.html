<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat with Krishna | My Kanha</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <!-- PWA Meta Tags -->
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Kanha">
  <meta name="description" content="Chat with Krishna - Your AI-powered spiritual companion">
  <script src="assets/js/config.js"></script>
</head>
<body>
  <header class="header">
    <div class="container-fluid">
      <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand logo" href="index.html">🙏 My Kanha</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active" href="chat.html">Chat</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="search.html">Search</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="history.html">History</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="settings.html">Settings</a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container chat-main">
      <div class="chat-section">
        <div class="chat-header">
          <h2>🙏 Converse with Krishna</h2>
          <p class="chat-subtitle">Ask anything about life, dharma, or spiritual wisdom</p>
        </div>

        <div class="chat-window" id="chatWindow">
          <div class="krishna-bg"></div>
          <!-- Chat messages will be dynamically added here -->
        </div>

        <form class="chat-form" id="chatForm">
          <input
            type="text"
            class="form-control chat-input"
            id="chatInput"
            placeholder="Ask Krishna anything..."
            autocomplete="off"
            maxlength="2000"
          >
          <button type="submit" class="btn btn-primary send-btn" id="sendBtn">Send</button>
        </form>
      </div>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="chat.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon">&#x1F4AC;</span>
      <span class="bottom-nav-label">Chat</span>
    </a>
    <a href="search.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x1F50D;</span>
      <span class="bottom-nav-label">Search</span>
    </a>
    <a href="history.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x1F4DC;</span>
      <span class="bottom-nav-label">History</span>
    </a>
    <a href="settings.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x2699;</span>
      <span class="bottom-nav-label">Settings</span>
    </a>
  </nav>

  <!-- Bootstrap JS and Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
  
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/chat.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
