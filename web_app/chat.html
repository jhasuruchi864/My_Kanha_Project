<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chat with Krishna | My Kanha</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e09f3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="My Kanha">
  <link rel="apple-touch-icon" href="assets/images/icon-192.png">
  <meta name="description" content="Chat with Krishna - Your AI-powered spiritual companion">
  <script src="assets/js/config.js"></script>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo">🙏 My Kanha</a>
    <nav class="nav">
      <a href="chat.html" class="active">Chat</a>
      <a href="search.html">Search</a>
      <a href="history.html">History</a>
      <a href="settings.html">Settings</a>
    </nav>
  </header>

  <main class="main chat-main">
    <section class="chat-section">
      <div class="chat-header">
        <h2>🙏 Converse with Krishna</h2>
        <p class="chat-subtitle">Ask anything about life, dharma, or spiritual wisdom</p>
      </div>

      <div class="chat-window" id="chatWindow">
        <div class="krishna-bg"></div>
        <!-- Chat messages will be dynamically added here -->
      </div>

      <form class="chat-form" id="chatForm">
        <input
          type="text"
          class="chat-input"
          id="chatInput"
          placeholder="Ask Krishna anything..."
          autocomplete="off"
          maxlength="2000"
        >
        <button type="submit" class="send-btn" id="sendBtn">Send</button>
      </form>

      
    </section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="chat.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon">&#x1F4AC;</span>
      <span class="bottom-nav-label">Chat</span>
    </a>
    <a href="search.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x1F50D;</span>
      <span class="bottom-nav-label">Search</span>
    </a>
    <a href="history.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x1F4DC;</span>
      <span class="bottom-nav-label">History</span>
    </a>
    <a href="settings.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">&#x2699;</span>
      <span class="bottom-nav-label">Settings</span>
    </a>
  </nav>

  <!-- Load JavaScript files -->
  <script src="assets/js/settings.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/chat.js"></script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
